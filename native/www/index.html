<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>GanaPlay Álbum</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: radial-gradient(circle at 50% 45%, #00783e 0%, #034419 100%);
        color: #fff;
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      a {
        color: #d4a017;
      }
    </style>
  </head>
  <body>
    <!--
      Fallback shell. Used ONLY if capacitor.config.ts has no server.url set
      (it should always be set at build time via CAP_SERVER_URL). The real app
      is the live deployment; this just keeps `cap` tooling happy and shows a
      branded message if misconfigured.
    -->
    <main>
      <p>GanaPlay Álbum</p>
      <p style="opacity: 0.7; font-size: 0.85rem">
        Configurando la app… Si esto persiste, abrí
        <a href="https://album2026.ganaplay.lat">album2026.ganaplay.lat</a>.
      </p>
    </main>
  </body>
</html>
